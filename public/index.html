      document.body.appendChild(overlay);
      overlay.dataset.selectedFile = '';
    }

    /** Highlight selected backup in the list */
    function selectBackup(el, file) {
      document.querySelectorAll('#backup-list .backup-item').forEach(li => li.classList.remove('selected'));
      el.classList.add('selected');
      const modal = document.getElementById('restore-modal');
      if (modal) modal.dataset.selectedFile = file;
      const btn = document.getElementById('btn-restore-confirm');
      if (btn) { btn.disabled = false; btn.textContent = '🔄 Restore Selected'; }
    }

    /** Handle file upload: upload + restore immediately */
    async function handleRestoreUpload(event, id) {
      const file = event.target.files[0];
      if (!file) return;
      if (!file.name.endsWith('.sql')) {
        alert('Please select a .sql file');
        return;
      }

      if (!confirm(`Upload and restore "${file.name}"?\n\n⚠️ This will DROP the current database and replace it entirely.`)) {
        event.target.value = '';
        return;
      }

      const btn = document.getElementById('btn-restore-confirm');
      if (btn) { btn.disabled = true; btn.textContent = '⏳ Restoring...'; }

      try {
        const buffer = await file.arrayBuffer();
        const res = await fetch(`/api/restore/${id}/upload`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/octet-stream',
            'X-Filename': file.name
          },
          body: buffer
        });
        const data = await res.json();
        if (data.success) {
          alert(`✅ Database restored successfully!\n\n${data.message}`);
          closeRestoreModal();
        } else {
          alert(`❌ Restore failed: ${data.message}`);
        }
      } catch (err) {
        alert(`❌ Restore error: ${err.message}`);
      } finally {
        if (btn) { btn.disabled = false; btn.textContent = '🔄 Restore Selected'; }
        event.target.value = '';
      }
    }

    /** Confirm restore from a selected existing backup */
    async function confirmRestore(id) {
      const modal = document.getElementById('restore-modal');
      const backupFile = modal?.dataset.selectedFile;
      if (!backupFile) return;

      if (!confirm(`Restore from "${backupFile}"?\n\n⚠️ This will DROP the current database and replace it entirely.`)) return;

      const btn = document.getElementById('btn-restore-confirm');
      if (btn) { btn.disabled = true; btn.textContent = '⏳ Restoring...'; }

      try {
        const res = await fetch(`/api/restore/${id}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ backupFile })
        });
        const data = await res.json();
        if (data.success) {
          alert(`✅ Database restored successfully!\n\n${data.message}`);
          closeRestoreModal();
        } else {
          alert(`❌ Restore failed: ${data.message}`);
        }
      } catch (err) {
        alert(`❌ Restore error: ${err.message}`);
      } finally {
        if (btn) { btn.disabled = false; btn.textContent = '🔄 Restore Selected'; }
      }
    }

    /** Close the restore modal */
    function closeRestoreModal() {
      const modal = document.getElementById('restore-modal');
      if (modal) modal.remove();
    }

    /** Check SSH + HTTP status and gather full VM system info */
    async function checkStatus(id) {
      const btn = document.getElementById(`btn-status-${id}`);
      // — Auto-expand this server card so loading/results are visible
      if (!state._expandedServers) state._expandedServers = [];
      if (!state._expandedServers.includes(id)) state._expandedServers.push(id);
      const body = document.getElementById(`server-body-${id}`);
      const chevron = document.getElementById(`chevron-${id}`);
      if (body) { body.classList.add('open'); }
      if (chevron) { chevron.classList.add('open'); }

      const detailEl = document.getElementById(`vm-detail-${id}`);
      if (btn) { btn.disabled = true; btn.textContent = 'Checking...'; }
      // — Show loading in detail panel
      if (detailEl) detailEl.innerHTML = '<div class="vm-detail"><p class="text-dim text-sm">Gathering system info via SSH...</p></div>';

      try {
        const res = await fetch(`/api/deployments/${id}/status`, { method: 'POST' });
        const data = await res.json();

        // — Update state and re-render manage view to show new data
        await loadDeployments();

      } catch (err) {
        if (detailEl) detailEl.innerHTML = `<div class="vm-detail"><p style="color: var(--red);">&#10060; ${err.message}</p></div>`;
        if (btn) { btn.disabled = false; btn.textContent = '\u{1F7E2} Status'; }
      }
    }

    /** Start full deploy wizard pre-filled with a registered (saved) server */
    function deployRegistered(id) {
      const d = state.deployments.find(dd => dd.id === id);
      if (!d) return;

      // — Pre-fill existing server details and jump to deploy mode step
      state.existingServer = { host: d.serverIP, user: d.sshUser, keyPath: d.sshKeyPath, label: d.domain, cloudProvider: d.cloudProvider || '' };
      state.infraSource = 'existing';
      startWizard().then(() => {
        // — Skip to step 3 (deploy mode) since server is already validated
        state.step = 3;
        renderWizardStep();
      });
    }

    // =================================================================
    // HELPERS
    // =================================================================

    /** Render a troubleshoot suggestion block */
    function renderTroubleshoot(ts) {
      if (!ts) return '';
      return `
        <div class="troubleshoot" style="margin-top: 12px;">
          <h4 style="color: var(--yellow);">&#128295; ${escapeHTML(ts.title || 'Troubleshooting')}</h4>
          <ul>${(ts.fixes || []).map(f => `<li>${escapeHTML(f)}</li>`).join('')}</ul>
        </div>
      `;
    }

    function escapeHTML(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function escapeAttr(str) {
      return str.replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    function generatePassword(len) {
      const chars = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
      let result = '';
      const values = crypto.getRandomValues(new Uint8Array(len));
      for (let i = 0; i < len; i++) result += chars[values[i] % chars.length];
      return result;
    }

    async function regenerateJWT() {
      try {
        const res = await fetch('/api/generate/secret');
        const data = await res.json();
        state.appConfig.jwtSecret = data.secret;
        renderWizardStep();
      } catch { /* ignore */ }
    }

    function toggleOptionalSection(name, show) {
      const el = document.getElementById(`section-${name}`);
      if (el) el.classList.toggle('hidden', !show);
    }

    function copyLogs() {
      const text = state.logs.map(l => l.text).join('\n');
      navigator.clipboard.writeText(text).then(() => {
        alert('Logs copied to clipboard');
      });
    }

    // =================================================================
    // INIT
    // =================================================================
    connectWS();
    renderHome();
  </script>
</body>
</html>
